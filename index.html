<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giuseppe Sandrini - Apps</title>
  <meta name="description" content="A collection of small web apps."/>
  <meta property="og:title" content="Giuseppe Sandrini - Apps"/>
  <meta property="og:description" content="A collection of small web apps."/>
  <meta property="og:type" content="website"/>
  <link rel="stylesheet" href="assets/css/tailwind.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script defer src="assets/js/alpine.min.js"></script>
</head>
<body
    class="font-mono text-[13px] min-h-screen"
    x-data="showcase()"
    x-cloak
>
<div id="lightbox" @click="closeLightbox()" x-show="showLightbox">
  <button id="lightbox-close" onclick="closeLightbox()" aria-label="Chiudi">&times;</button>
  <img id="lightbox-img" :src="lightboxSrc" :alt="lightboxAlt"/>
</div>
<div class="max-w-3xl mx-auto px-4 py-3">
  <div class="mb-4 flex items-start justify-between">
    <div>
      <h1 class="text-[22px] font-medium tracking-tight mb-1">Giuseppe Sandrini</h1>
      <p class="text-[12px] text-muted">Small apps · Open source</p>
    </div>
    <button
        @click="toggleLang()"
        class="btn-secondary text-[11px] px-2.5 py-1 rounded-md mt-1"
        x-text="lang === 'it' ? 'EN' : 'IT'"
    ></button>
  </div>
  <div class="mb-3 flex gap-1">
    <button
        @click="activeTab = 'about'"
        class="tab-btn"
        :class="{ active: activeTab === 'about' }"
        x-text="t.tabAbout"
    ></button>
    <button
        @click="activeTab = 'usage'"
        class="tab-btn"
        :class="{ active: activeTab === 'usage' }"
        x-text="t.tabUsage"
    ></button>
  </div>
  <div class="app-card mb-6 p-4 rounded-2xl">
    <div x-show="activeTab === 'about'" class="text-[12px] space-y-3 text-muted">
      <p x-text="t.aboutText"></p>
    </div>
    <div x-show="activeTab === 'usage'" class="text-[12px] space-y-3 text-muted">
      <p x-text="t.usageDescription"></p>
      <h3 x-text="t.browserTitle" class="font-bold"></h3>
      <p x-text="t.browserText"></p>
      <h3 x-text="t.installTitle" class="font-bold"></h3>
      <ol class="list-decimal ml-5 space-y-1">
        <li x-text="t.installStep1"></li>
        <li x-text="t.installStep2"></li>
        <li x-text="t.installStep3"></li>
      </ol>
    </div>
  </div>
  <div class="grid gap-6 sm:grid-cols-2">
    <template x-for="app in apps" :key="app.id">
      <div class="app-card rounded-2xl overflow-hidden">
        <div class="overflow-hidden screenshot-area">
          <img
              :src="app.screenshot"
              :alt="app.name"
              class="w-full object-contain object-top"
              x-show="app.screenshot"
              @error="$el.style.display='none'"
              @click="app.screenshot && openLightbox(app.screenshot, app.name)"
          />
          <div
              class="absolute inset-0 flex items-center justify-center text-muted text-[11px] uppercase tracking-widest"
              style="opacity:0.4"
              x-show="!app.screenshot"
              x-text="t.screenshotPlaceholder"
          ></div>
        </div>
        <div class="p-5">
          <div class="flex items-center gap-2 mb-2 flex-wrap">
            <span class="font-medium text-[14px]" x-text="app.name"></span>
            <span class="badge" x-text="app.tag"></span>
            <span x-show="app.pwa" class="badge-pwa">PWA</span>
          </div>
          <p class="text-[12px] text-muted leading-relaxed mb-5" x-text="app.desc[lang]"></p>
          <p x-show="!app.pwa" class="text-[11px] text-muted leading-relaxed mb-5 opacity-60">
            🖥️ <span x-text="t.desktopApp"></span>
          </p>
          <div class="flex gap-2">
            <a x-show="app.demoUrl"
               :href="app.demoUrl"
               target="_blank"
               rel="noopener"
               class="btn-primary h-9 px-4 rounded-lg text-[12px] font-medium inline-flex items-center gap-1.5"
            >
              <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/>
              </svg>
              <span x-text="t.btnDemo"></span>
            </a>
            <a
                :href="app.repoUrl"
                target="_blank"
                rel="noopener"
                class="btn-secondary h-9 px-4 rounded-lg text-[12px] inline-flex items-center gap-1.5"
            >
              <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
              </svg>
              GitHub
            </a>
          </div>
        </div>
      </div>
    </template>
  </div>
  <div class="divider mt-16 pt-6 flex flex-col sm:flex-row items-center justify-between gap-3 text-[11px] text-muted"
       style="opacity:0.6">
    <span x-text="t.license"></span>
    <span>
        <span x-text="t.madeWith"></span>
        <a href="https://claude.ai" target="_blank" rel="noopener" class="footer-link">Claude</a>
        (Anthropic)
      </span>
  </div>
</div>
<script src="assets/js/app.js"></script>
</body>
</html>
